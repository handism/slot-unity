name: バグ報告
description: 不具合・予期しない動作を報告する
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        バグ報告ありがとうございます。再現に必要な情報をできるだけ詳しく記入してください。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているか一言で
      placeholder: 例）フリースピン中にコイン残高がマイナスになる
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための最小手順
      placeholder: |
        1. スピンを押す
        2. Scatter が 3 つ揃いフリースピン開始
        3. フリースピン中に〇〇すると…
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期待する動作
      placeholder: 例）コイン残高は 0 以下にならないはず
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      placeholder: 例）残高が -500 になりゲームが続行できなくなる
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 再現頻度
      options:
        - 常に再現する
        - 高頻度（50% 以上）
        - 低頻度（まれに）
        - 未確認（1 回のみ）
    validations:
      required: true

  - type: input
    id: unity_version
    attributes:
      label: Unity バージョン
      placeholder: 例）6.3.x LTS
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 実行環境
      multiple: true
      options:
        - Windows (Editor)
        - macOS (Editor)
        - Windows Build
        - macOS Build
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console ログ / スタックトレース
      description: Unity Console のエラーがあれば貼り付けてください
      render: text

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: スクリーンショット、動画、関連コミット等
