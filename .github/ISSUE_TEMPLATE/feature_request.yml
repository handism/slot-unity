name: 機能要望
description: 新機能・改善案を提案する
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新機能・改善の提案をありがとうございます。背景と目的を明確に記入してください。

  - type: textarea
    id: problem
    attributes:
      label: 背景・解決したい課題
      description: なぜこの機能が必要か
      placeholder: 例）ボーナスラウンド中に演出をスキップできず、テンポが悪いと感じる
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・変更を望むか
      placeholder: 例）ボーナス演出をタップでスキップできるボタンを追加する
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      multiple: true
      options:
        - ゲームプレイ（スピン・配当・フリースピン）
        - ボーナスラウンド
        - UI / UX
        - 演出・アニメーション
        - サウンド
        - 設定・セーブデータ
        - パフォーマンス
        - 開発者ツール / デバッグ
        - その他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に考えたアプローチがあれば

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考画像・リンク・関連 Issue など
